<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock News</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header{background:linear-gradient(90deg,#ff2e2e,#b30000);padding:20px;text-align:center;font-size:22px;font-weight:bold;}
.container{max-width:1000px;margin:auto;padding:20px;}
.card{background:#1c1c1c;margin-bottom:25px;border-radius:12px;overflow:hidden;box-shadow:0 0 20px rgba(255,0,0,0.2);}
iframe{width:100%;height:300px;}
.content{padding:15px;}
.title{font-size:17px;font-weight:bold;margin-bottom:8px;}
.meta{font-size:13px;color:#aaa;margin-bottom:8px;}
.desc{font-size:14px;color:#ccc;margin-bottom:10px;}
.loader{border:5px solid #333;border-top:5px solid red;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{100%{transform:rotate(360deg);}}
footer{text-align:center;padding:20px;font-size:12px;color:gray;}
</style>
</head>

<body>

<header>⚡ India Shocking News</header>

<div class="container">
<div id="videos"></div>
<div id="loader" class="loader"></div>
</div>

<footer>Powered by Firebase Cache</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 REPLACE THIS ENTIRE OBJECT WITH YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("videos");
const loader = document.getElementById("loader");

async function loadNews(){
loader.style.display="block";
container.innerHTML="";

const querySnapshot = await getDocs(collection(db, "news"));

querySnapshot.forEach((doc)=>{
const data = doc.data();

container.innerHTML += `
<div class="card">
<iframe src="https://www.youtube.com/embed/${data.videoId}" frameborder="0" allowfullscreen></iframe>
<div class="content">
<div class="title">${data.title}</div>
<div class="meta">${data.channel} | ${data.date}</div>
<div class="desc">${data.description}</div>
</div>
</div>`;
});

loader.style.display="none";
}

loadNews();

</script>

</body>
</html>
