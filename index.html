<!DOCTYPE html>
<html>
<head>
<title>India Shock News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
header{background:#ff2e2e;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.container{padding:15px;max-width:900px;margin:auto;}
.card{background:#1c1c1c;margin-bottom:20px;border-radius:10px;overflow:hidden;}
iframe{width:100%;height:300px;}
.content{padding:12px;}
.title{font-size:17px;font-weight:bold;margin-bottom:8px;}
.meta{font-size:13px;color:#aaa;margin-bottom:8px;}
.desc{font-size:14px;color:#ccc;margin-bottom:10px;}
footer{text-align:center;padding:20px;font-size:12px;color:gray;}
</style>
</head>

<body>

<header>⚡ India Shocking News</header>

<div class="container" id="videos">Loading...</div>

<footer>All videos belong to respective owners. We embed official YouTube content.</footer>

<script>

const API_KEY = "AIzaSyCTZ9OCqzxLqMW0Z3htSasQcim73xkTZv0";

const CHANNEL_ID = "UCt4t-jeY85JegMlZ-E5UWtA"; // Aaj Tak example

async function loadVideos(){
    let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=5`;

    let res = await fetch(url);
    let data = await res.json();

    let container = document.getElementById("videos");
    container.innerHTML = "";

    data.items.forEach(item=>{
        if(!item.id.videoId) return;

        let date = new Date(item.snippet.publishedAt).toLocaleString();

        container.innerHTML += `
        <div class="card">
            <iframe src="https://www.youtube.com/embed/${item.id.videoId}" frameborder="0" allowfullscreen></iframe>
            <div class="content">
                <div class="title">${item.snippet.title}</div>
                <div class="meta">Published: ${date}</div>
                <div class="desc">${item.snippet.description.substring(0,200)}...</div>
            </div>
        </div>
        `;
    });
}

loadVideos();

</script>

</body>
</html>
