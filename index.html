<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock Reels</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:black;
  font-family:system-ui;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.reel{
  height:100vh;
  width:100%;
  position:relative;
  scroll-snap-align:start;
  overflow:hidden;
}
.player{
  width:100%;
  height:100%;
}
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:25px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
  color:white;
}
.title{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}
.meta{
  font-size:13px;
  opacity:0.8;
}
.category{
  display:inline-block;
  padding:4px 10px;
  background:#ff2e2e;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
}
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:25px;
  color:white;
  align-items:center;
}
.actions div{
  text-align:center;
  cursor:pointer;
  font-size:18px;
}
.heart{
  transition:transform 0.2s ease;
}
.heart.active{
  color:red;
  transform:scale(1.3);
}
.double-tap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  opacity:0;
  pointer-events:none;
}
.double-tap.show{
  animation:pop 0.6s ease;
}
@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}
.progress{
  position:absolute;
  top:0;
  left:0;
  height:4px;
  background:#ff2e2e;
  width:0%;
  transition:width 0.1s linear;
}
</style>
</head>

<body>

<div id="reels"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players = [];
let activeIndex = 0;

async function load() {
  const snapshot = await getDocs(collection(db,"news"));
  const data=[];
  snapshot.forEach(doc=>data.push(doc.data()));
  data.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  render(data);
}

function render(data){
  const container=document.getElementById("reels");
  container.innerHTML="";
  data.forEach((n,i)=>{
    container.innerHTML+=`
      <div class="reel" data-index="${i}">
        <div class="progress"></div>
        <div class="player" id="player-${i}"></div>
        <div class="overlay">
          <div class="category">${n.category}</div>
          <div class="title">${n.title}</div>
          <div class="meta">${n.channel}</div>
        </div>
        <div class="actions">
          <div class="heart" onclick="toggleLike(this)">❤️<br><small>Like</small></div>
          <div>🔁<br><small>Share</small></div>
        </div>
        <div class="double-tap">❤️</div>
      </div>
    `;
  });

  loadYouTube(data);
  setupObserver();
}

function loadYouTube(data){
  players=[];
  data.forEach((n,i)=>{
    const player = new YT.Player(`player-${i}`,{
      videoId:n.videoId,
      playerVars:{
        autoplay:0,
        controls:0,
        modestbranding:1,
        rel:0
      }
    });
    players.push(player);
  });
}

function setupObserver(){
  const reels=document.querySelectorAll(".reel");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const index=parseInt(entry.target.dataset.index);
      if(entry.isIntersecting){
        activeIndex=index;
        play(index);
      } else {
        pause(index);
      }
    });
  },{threshold:0.7});
  reels.forEach(r=>observer.observe(r));
}

function play(i){
  if(players[i] && players[i].playVideo)
    players[i].playVideo();
}
function pause(i){
  if(players[i] && players[i].pauseVideo)
    players[i].pauseVideo();
}

window.toggleLike=function(el){
  el.classList.toggle("active");
};

document.addEventListener("dblclick",e=>{
  const reel=e.target.closest(".reel");
  if(!reel) return;
  const heart=reel.querySelector(".double-tap");
  heart.classList.add("show");
  setTimeout(()=>heart.classList.remove("show"),600);
});

window.onYouTubeIframeAPIReady=function(){};

const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

load();

</script>

</body>
</html>
