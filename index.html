<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock Reels</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(to bottom,#000,#111);
  font-family:system-ui,-apple-system,BlinkMacSystemFont;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  color:white;
}
.reel{
  height:100vh;
  width:100%;
  scroll-snap-align:start;
  position:relative;
  overflow:hidden;
}
iframe{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:25px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}
.category{
  display:inline-block;
  padding:5px 12px;
  background:#ff2e2e;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
}
.title{
  font-size:18px;
  font-weight:600;
  margin-bottom:8px;
}
.meta{
  font-size:13px;
  opacity:0.8;
}
.side-actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  font-size:14px;
  align-items:center;
}
.side-actions div{
  text-align:center;
  cursor:pointer;
}
.progress{
  position:absolute;
  top:0;
  left:0;
  height:4px;
  background:#ff2e2e;
  width:0%;
  transition:width 0.2s linear;
}
.loader{
  text-align:center;
  padding:20px;
}
.fade-in{
  animation:fade 0.5s ease;
}
@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<div id="reelsContainer"></div>
<div id="loader" class="loader">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allNews=[];
let visibleCount=3;

async function loadNews(){
  const snapshot=await getDocs(collection(db,"news"));
  allNews=[];
  snapshot.forEach(doc=>allNews.push(doc.data()));
  allNews.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  render();
  document.getElementById("loader").style.display="none";
}

function render(){
  const container=document.getElementById("reelsContainer");
  container.innerHTML="";

  allNews.slice(0,visibleCount).forEach(n=>{
    container.innerHTML+=`
      <div class="reel fade-in">
        <div class="progress"></div>
        <iframe 
          src="https://www.youtube.com/embed/${n.videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${n.videoId}"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
        <div class="overlay">
          <div class="category">${n.category}</div>
          <div class="title">${n.title}</div>
          <div class="meta">${n.channel}</div>
        </div>
        <div class="side-actions">
          <div>❤️<br>Like</div>
          <div>🔁<br>Share</div>
          <div>💬<br>Comment</div>
        </div>
      </div>
    `;
  });
}

window.addEventListener("scroll",()=>{
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
    visibleCount+=2;
    render();
  }
});

loadNews();

</script>

</body>
</html>
