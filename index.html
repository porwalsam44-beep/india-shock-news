<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock Reels</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.reel{
  height:100vh;
  width:100%;
  scroll-snap-align:start;
  position:relative;
}
iframe{
  width:100%;
  height:100%;
}
.overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  text-shadow:0 0 10px black;
}
.title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:5px;
}
.meta{
  font-size:13px;
  opacity:0.8;
}
.loader{
  text-align:center;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<div id="reelsContainer"></div>
<div id="loader" class="loader">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allNews=[];
let visibleCount=3;

async function loadNews(){
  const snapshot=await getDocs(collection(db,"news"));
  allNews=[];
  snapshot.forEach(doc=>allNews.push(doc.data()));
  allNews.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  render();
  document.getElementById("loader").style.display="none";
}

function render(){
  const container=document.getElementById("reelsContainer");
  container.innerHTML="";

  allNews.slice(0,visibleCount).forEach(n=>{
    container.innerHTML+=`
      <div class="reel">
        <iframe 
          src="https://www.youtube.com/embed/${n.videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${n.videoId}" 
          frameborder="0" 
          allow="autoplay; encrypted-media" 
          allowfullscreen>
        </iframe>
        <div class="overlay">
          <div class="title">${n.title}</div>
          <div class="meta">${n.channel}</div>
        </div>
      </div>
    `;
  });
}

window.addEventListener("scroll",()=>{
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
    visibleCount+=2;
    render();
  }
});

loadNews();

</script>

</body>
</html>
