<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock News</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.reel{
  height:100vh;
  width:100%;
  position:relative;
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}
.video-container{
  position:absolute;
  inset:0;
}
iframe{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:25px;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}
.category{
  font-size:12px;
  font-weight:600;
  color:#ff3b3b;
  margin-bottom:8px;
}
.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
  line-height:1.3;
}
.meta{
  font-size:13px;
  opacity:0.8;
}
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:28px;
  align-items:center;
}
.action-btn{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
}
.action-btn:hover{
  transform:scale(1.1);
}
.heart.active{
  color:#ff2e63;
}
.double-heart{
  position:absolute;
  font-size:80px;
  opacity:0;
  pointer-events:none;
}
.double-heart.show{
  animation:pop 0.6s ease;
}
@keyframes pop{
  0%{opacity:0;transform:scale(0.5)}
  50%{opacity:1;transform:scale(1.3)}
  100%{opacity:0;transform:scale(1)}
}
.top-bar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:center;
  font-weight:700;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
</style>
</head>

<body>

<div class="top-bar">⚡ India Shock News</div>
<div id="feed"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players=[];
let activeIndex=0;

async function load(){
  const snap=await getDocs(collection(db,"news"));
  const data=[];
  snap.forEach(doc=>data.push(doc.data()));
  data.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  render(data);
}

function render(data){
  const container=document.getElementById("feed");
  container.innerHTML="";
  data.forEach((n,i)=>{
    container.innerHTML+=`
      <div class="reel" data-index="${i}">
        <div class="video-container" id="player-${i}"></div>
        <div class="overlay">
          <div class="category">${n.category}</div>
          <div class="title">${n.title}</div>
          <div class="meta">${n.channel}</div>
        </div>
        <div class="actions">
          <div class="action-btn heart" onclick="toggleLike(this)">❤️</div>
          <div class="action-btn">🔁</div>
        </div>
        <div class="double-heart">❤️</div>
      </div>
    `;
  });

  initPlayers(data);
  observe();
}

function initPlayers(data){
  data.forEach((n,i)=>{
    players[i]=new YT.Player(`player-${i}`,{
      videoId:n.videoId,
      playerVars:{
        autoplay:0,
        controls:0,
        modestbranding:1,
        rel:0
      }
    });
  });
}

function observe(){
  const reels=document.querySelectorAll(".reel");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const i=parseInt(entry.target.dataset.index);
      if(entry.isIntersecting){
        activeIndex=i;
        players[i]?.playVideo();
        players.forEach((p,index)=>{
          if(index!==i) p?.pauseVideo();
        });
      }
    });
  },{threshold:0.75});
  reels.forEach(r=>observer.observe(r));
}

window.toggleLike=function(el){
  el.classList.toggle("active");
};

document.addEventListener("dblclick",e=>{
  const reel=e.target.closest(".reel");
  if(!reel) return;
  const heart=reel.querySelector(".double-heart");
  heart.classList.add("show");
  setTimeout(()=>heart.classList.remove("show"),600);
});

load();

</script>

</body>
</html>
